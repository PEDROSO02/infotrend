---
layout: default
title: Home
---

<h1 style="margin-bottom:20px;">🔥 Produtos que valem a pena</h1>

<div class="posts-grid">
  {% for post in site.posts %}
    <div class="post-card">
      <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
      <p>{{ post.excerpt | strip_html | truncate: 100 }}</p>
     <a href="{{ post.url | relative_url }}" class="btn">Ver análise</a>
    </div>
  {% endfor %}
</div>
